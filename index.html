<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧旅遊行程規劃助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #fa5252;
            --bg-light: #f8f9fa;
            --text-dark: #2b2d42;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            color: var(--text-dark);
            overflow-x: hidden;
        }
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 1000;
            transition: transform 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }
        .main-content {
            margin-left: 280px;
            padding: 30px;
            transition: margin 0.3s ease;
        }
        .hero-banner {
            height: 250px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .hero-mask {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            z-index: 1;
        }
        .hero-title {
            position: relative;
            z-index: 2;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.18);
            margin-bottom: 25px;
        }
        .plan-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
        }
        .plan-item:hover, .plan-item.active {
            background: var(--primary);
            color: white;
        }
        .plan-item button {
            background: transparent;
            border: none;
            color: inherit;
            font-weight: bold;
        }
        .btn-delete-plan {
            background: transparent;
            border: none;
            color: inherit;
            font-weight: bold;
        }
        .activity-wrapper {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: relative;
        }
        .transport-pill {
            display: inline-flex;
            align-items: center;
            background: #edf2f7;
            padding: 6px 12px;
            border-radius: 20px;
            margin-right: 8px;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .transport-pill select, .transport-pill input {
            border: none;
            background: transparent;
            outline: none;
        }
        .nav-tabs .nav-link {
            border: none;
            color: #4a5568;
            font-weight: 500;
            border-radius: 10px;
            margin-right: 5px;
        }
        .nav-tabs .nav-link.active {
            background-color: var(--primary);
            color: white !important;
        }
        .toggle-btn {
            display: none;
            position: fixed;
            top: 15px; left: 15px;
            z-index: 1100;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }

        #print-output-container {
            display: none;
        }

        @media (max-width: 991.98px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; }
            .toggle-btn { display: block; }
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <button class="btn btn-dark toggle-btn no-print" onclick="toggleSidebar()">☰ 選單</button>

    <div class="sidebar no-print" id="sidebar">
        <h4 class="fw-bold mb-4" style="color:var(--primary)">Planner.</h4>
        <button class="btn btn-danger w-100 mb-3 fw-bold py-2 shadow-sm" style="background:var(--primary); border:none;" onclick="createNewPlan()">+ 新建旅程</button>
        
        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline-secondary btn-sm w-50" onclick="exportTextData()">📥 複製文字備份</button>
            <button class="btn btn-outline-secondary btn-sm w-50" onclick="importTextData()">📤 貼上還原行程</button>
        </div>

        <div class="dropdown mb-4">
            <button class="btn btn-light btn-sm w-100 dropdown-toggle" type="button" data-bs-toggle="dropdown">複製已有行程</button>
            <ul class="dropdown-menu w-100" id="copyPlanDropdown"></ul>
        </div>

        <hr>
        <h6 class="text-muted fw-bold mb-3">我的旅程清單</h6>
        <div id="planList"></div>
    </div>

    <div class="main-content" id="print-area">
        <div class="hero-banner" id="heroBg">
            <div class="hero-mask"></div>
            <div class="hero-title" id="dynamicTitle">探索新視界</div>
        </div>

        <div class="glass-card no-print">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold text-muted small">出發日期</label>
                    <input type="date" id="startDate" class="form-control border-0 bg-light py-2" style="border-radius:10px;" onchange="updateAllTitles()">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold text-muted small">天數</label>
                    <input type="number" id="days" class="form-control border-0 bg-light py-2" min="1" value="1" style="border-radius:10px;" onchange="initPlanner()">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-muted small">目的地</label>
                    <div class="input-group">
                        <input type="text" id="loc" class="form-control border-0 bg-light py-2" placeholder="例如：東京、巴黎..." style="border-radius:10px 0 0 10px;" oninput="updateAllTitles()">
                        <button class="btn btn-light bg-light border-0" type="button" onclick="searchGoogleVal(document.getElementById('loc').value)">🔍</button>
                    </div>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-dark w-100 py-2 fw-bold" style="border-radius:10px;" onclick="initPlanner()">生成行程表</button>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs border-0 mb-4 no-print" id="dayTabs" role="tablist"></ul>

        <div class="tab-content" id="dayContent"></div>

        <button class="btn btn-primary mt-4 no-print shadow" style="border-radius:12px; padding:12px 25px;" onclick="exportPDF()">🖨️ 匯出文字版 PDF 行程表</button>
    </div>

    <div class="modal fade" id="textDataModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="border-radius: 15px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">行程數據通訊代碼</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-2" id="modalDesc">請複製下方文字並妥善儲存：</p>
                    <textarea class="form-control bg-light border-0" id="textDataArea" rows="12" style="border-radius: 10px; font-family: monospace; font-size: 13px;"></textarea>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal" style="border-radius: 8px;">關閉</button>
                    <button type="button" class="btn btn-primary fw-bold" id="modalActionBtn" style="border-radius: 8px;">一鍵複製文字</button>
                </div>
            </div>
        </div>
    </div>

    <div id="print-output-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    let currentPlanId = null;
    let plans = JSON.parse(localStorage.getItem('travel_v17_final')) || {};
    let isLoading = false; 
    let textModal = null;

    window.addEventListener('DOMContentLoaded', () => {
        textModal = new bootstrap.Modal(document.getElementById('textDataModal'));
        loadPlanList();
        if(Object.keys(plans).length > 0) {
            loadPlan(Object.keys(plans)[0]);
        }
    });

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.querySelector('.sidebar-overlay').classList.toggle('active');
    }

    function updateHeroBg(loc) {
        const hero = document.getElementById('heroBg');
        const keyword = loc ? encodeURIComponent(loc) : 'travel,mountain,landscape';
        const url1 = `https://images.unsplash.com/featured/?${keyword},scenery&t=${Date.now()}`;
        const url2 = `https://picsum.photos/1600/900?travel&t=${Date.now()}`;
        const img = new Image();
        img.src = url1;
        img.onload = () => { hero.style.backgroundImage = `url('${url1}')`; };
        img.onerror = () => {
            const imgBackup = new Image();
            imgBackup.src = url2;
            imgBackup.onload = () => { hero.style.backgroundImage = `url('${url2}')`; };
        };
    }

    function saveToStorage() { 
        localStorage.setItem('travel_v17_final', JSON.stringify(plans)); 
    }

    function loadPlanList() {
        const list = document.getElementById('planList'), dropdown = document.getElementById('copyPlanDropdown');
        list.innerHTML = ''; dropdown.innerHTML = '';
        Object.keys(plans).forEach(id => {
            const p = plans[id];
            const item = document.createElement('div');
            item.className = `plan-item ${id === currentPlanId ? 'active' : ''}`;
            item.innerHTML = `<div onclick="loadPlan('${id}'); if(window.innerWidth < 992) toggleSidebar();"><strong>${p.location || '未命名旅程'}</strong><br><small>${p.date || '點擊設定'}</small></div><button class="btn-delete-plan no-print" onclick="deletePlan('${id}', event)">✕</button>`;
            list.appendChild(item);
            dropdown.innerHTML += `<li><a class="dropdown-item" href="#" onclick="duplicatePlan('${id}')">${p.location || '行程'}</a></li>`;
        });
    }

    function loadPlan(id) {
        if (!plans[id]) return;
        currentPlanId = id; 
        const p = plans[id];
        
        isLoading = true; 
        document.getElementById('startDate').value = p.date || '';
        document.getElementById('loc').value = p.location || '';
        document.getElementById('days').value = p.days || 1;
        
        renderPlanner(p.daysData || []);
        
        isLoading = false; 
        updateAllTitles(); 
        loadPlanList();
    }

    function createNewPlan() {
        const id = 'p' + Date.now();
        plans[id] = { id, date: '', location: '', days: 1, daysData: [{ activities: [], note: '' }] };
        saveToStorage(); 
        loadPlan(id);
    }

    function duplicatePlan(sid) {
        const nid = 'p' + Date.now();
        plans[nid] = JSON.parse(JSON.stringify(plans[sid]));
        plans[nid].id = nid; 
        plans[nid].location += " (副本)";
        saveToStorage(); 
        loadPlan(nid);
    }

    function deletePlan(id, e) { 
        e.stopPropagation(); 
        if(confirm("確定刪除此行程嗎？")) { 
            delete plans[id]; 
            saveToStorage(); 
            location.reload(); 
        } 
    }

    let bgTimer;
    function updateAllTitles() {
        const l = document.getElementById('loc').value;
        document.getElementById('dynamicTitle').innerText = l || "探索新視界";
        clearTimeout(bgTimer); 
        bgTimer = setTimeout(() => updateHeroBg(l), 1500);
        if(currentPlanId && !isLoading) { 
            plans[currentPlanId].date = document.getElementById('startDate').value; 
            plans[currentPlanId].location = l; 
            saveToStorage();
            loadPlanList(); 
        }
    }

    function initPlanner() {
        if(!currentPlanId) return;
        const num = parseInt(document.getElementById('days').value) || 1;
        plans[currentPlanId].daysData = Array.from({length: num}, () => ({ activities: [], note: '' }));
        plans[currentPlanId].days = num;
        renderPlanner(plans[currentPlanId].daysData); 
        saveCurrentData();
    }

    function renderPlanner(daysData) {
        const tabH = document.getElementById('dayTabs'), contH = document.getElementById('dayContent');
        tabH.innerHTML = ''; contH.innerHTML = '';
        const dStart = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : new Date();

        daysData.forEach((day, i) => {
            const id = `d${i}`, curDate = new Date(dStart); 
            curDate.setDate(dStart.getDate() + i);
            const dateStr = curDate.toLocaleDateString('zh-TW', {month:'short', day:'numeric', weekday:'short'});
            
            tabH.innerHTML += `<li class="nav-item"><button class="nav-link ${i===0?'active':''}" data-bs-toggle="tab" data-bs-target="#${id}">D${i+1} (${dateStr})</button></li>`;
            
            let actHtml = '';
            if (day.activities && day.activities.length > 0) {
                day.activities.forEach(act => {
                    let transHtml = '';
                    if (act.transports) {
                        act.transports.forEach(t => {
                            transHtml += `
                                <div class="transport-pill shadow-sm">
                                    <select class="border-0 bg-transparent fw-bold trans-select" style="outline:none;" onchange="saveCurrentData()">
                                        <option ${t.type=='🚶'?'selected':''}>🚶</option>
                                        <option ${t.type=='🚇'?'selected':''}>🚇</option>
                                        <option ${t.type=='🚌'?'selected':''}>🚌</option>
                                        <option ${t.type=='🚕'?'selected':''}>🚕</option>
                                    </select>
                                    <input type="time" class="trans-time-picker" value="${t.duration || '00:30'}" onchange="saveCurrentData()">
                                    <button class="btn btn-sm p-0 text-muted ms-1" onclick="this.parentElement.remove(); saveCurrentData();">✕</button>
                                </div>`;
                        });
                    }

                    actHtml += `
                        <div class="activity-wrapper">
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <button class="btn btn-light btn-sm no-print p-1" onclick="moveItem(this, -1)">↑</button>
                                <button class="btn btn-light btn-sm no-print p-1" onclick="moveItem(this, 1)">↓</button>
                                <input type="time" class="form-control border-0 bg-light py-1 px-2 act-time" style="width:110px; border-radius:8px; color:var(--primary); font-weight:bold;" value="${act.time || ''}" onchange="saveCurrentData()">
                                <div class="input-group flex-grow-1">
                                    <input type="text" class="form-control border-0 bg-light py-1 spot-input" placeholder="想去哪裡？" style="border-radius:8px 0 0 8px; font-weight:500;" value="${act.spot || ''}" oninput="saveCurrentData()">
                                    <button class="btn btn-light bg-light border-0 no-print" type="button" onclick="searchGoogleSpot(this)">🔍</button>
                                </div>
                                <button class="btn btn-light btn-sm no-print ms-2 text-muted" title="複製此點到其他天" onclick="copyToDay(this)">📋</button>
                                <button class="btn btn-light btn-sm no-print text-danger ms-1" onclick="removeWrapper(this)">🗑️</button>
                            </div>
                            <div class="mb-2">
                                <input type="text" class="form-control border-0 bg-light btn-sm field-detail" placeholder="💡 門票、預約號碼或備註..." style="border-radius:8px; font-size:0.9rem;" value="${act.detail || ''}" oninput="saveCurrentData()">
                            </div>
                            <div class="transport-section no-print">
                                <div class="transport-list d-inline-block">${transHtml}</div>
                                <button class="btn btn-link btn-sm text-decoration-none text-muted p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="addTransport(this)">+ 增加交通</button>
                                <button class="btn btn-link btn-sm text-decoration-none text-primary p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="openRouteJump(this, 'google')">Google Map</button>
                                <button class="btn btn-link btn-sm text-decoration-none text-success p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="openRouteJump(this, 'amap')">高德地圖</button>
                            </div>
                        </div>`;
                });
            } else {
                actHtml = `
                    <div class="activity-wrapper">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <button class="btn btn-light btn-sm no-print p-1" onclick="moveItem(this, -1)">↑</button>
                            <button class="btn btn-light btn-sm no-print p-1" onclick="moveItem(this, 1)">↓</button>
                            <input type="time" class="form-control border-0 bg-light py-1 px-2 act-time" style="width:110px; border-radius:8px; color:var(--primary); font-weight:bold;" onchange="saveCurrentData()">
                            <div class="input-group flex-grow-1">
                                <input type="text" class="form-control border-0 bg-light py-1 spot-input" placeholder="想去哪裡？" style="border-radius:8px 0 0 8px; font-weight:500;" oninput="saveCurrentData()">
                                <button class="btn btn-light bg-light border-0 no-print" type="button" onclick="searchGoogleSpot(this)">🔍</button>
                            </div>
                            <button class="btn btn-light btn-sm no-print ms-2 text-muted" title="複製此點到其他天" onclick="copyToDay(this)">📋</button>
                            <button class="btn btn-light btn-sm no-print text-danger ms-1" onclick="removeWrapper(this)">🗑️</button>
                        </div>
                        <div class="mb-2">
                            <input type="text" class="form-control border-0 bg-light btn-sm field-detail" placeholder="💡 門票、預約號碼或備註..." style="border-radius:8px; font-size:0.9rem;" oninput="saveCurrentData()">
                        </div>
                        <div class="transport-section no-print">
                            <div class="transport-list d-inline-block"></div>
                            <button class="btn btn-link btn-sm text-decoration-none text-muted p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="addTransport(this)">+ 增加交通</button>
                            <button class="btn btn-link btn-sm text-decoration-none text-primary p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="openRouteJump(this, 'google')">Google Map</button>
                            <button class="btn btn-link btn-sm text-decoration-none text-success p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="openRouteJump(this, 'amap')">高德地圖</button>
                        </div>
                    </div>`;
            }

            contH.innerHTML += `
                <div class="tab-pane fade ${i===0?'show active':''}" id="${id}">
                    <div class="glass-card">
                        <h5 class="fw-bold mb-4" style="color:var(--primary)">Day ${i+1} • ${dateStr}</h5>
                        <div class="act-container">${actHtml}</div>
                        <button class="btn btn-light w-100 mt-2 py-3 fw-bold no-print" style="border:2px dashed #cbd5e0; border-radius:15px; color: #718096;" onclick="addAct('${id}')">+ 加入行程或餐廳</button>
                        <textarea class="form-control mt-4 border-0 bg-light day-note-area" rows="3" style="border-radius:15px" placeholder="在這裡寫下筆記..." oninput="saveCurrentData()">${day.note || ''}</textarea>
                    </div>
                </div>`;
        });
    }

    function addAct(dayId) { 
        const container = document.querySelector(`#${dayId} .act-container`);
        const div = document.createElement('div');
        div.className = 'activity-wrapper';
        div.innerHTML = `
            <div class="d-flex align-items-center gap-2 mb-3">
                <button class="btn btn-light btn-sm no-print p-1" onclick="moveItem(this, -1)">↑</button>
                <button class="btn btn-light btn-sm no-print p-1" onclick="moveItem(this, 1)">↓</button>
                <input type="time" class="form-control border-0 bg-light py-1 px-2 act-time" style="width:110px; border-radius:8px; color:var(--primary); font-weight:bold;" onchange="saveCurrentData()">
                <div class="input-group flex-grow-1">
                    <input type="text" class="form-control border-0 bg-light py-1 spot-input" placeholder="想去哪裡？" style="border-radius:8px 0 0 8px; font-weight:500;" oninput="saveCurrentData()">
                    <button class="btn btn-light bg-light border-0 no-print" type="button" onclick="searchGoogleSpot(this)">🔍</button>
                </div>
                <button class="btn btn-light btn-sm no-print ms-2 text-muted" title="複製此點到其他天" onclick="copyToDay(this)">📋</button>
                <button class="btn btn-light btn-sm no-print text-danger ms-1" onclick="removeWrapper(this)">🗑️</button>
            </div>
            <div class="mb-2">
                <input type="text" class="form-control border-0 bg-light btn-sm field-detail" placeholder="💡 門票、預約號碼或備註..." style="border-radius:8px; font-size:0.9rem;" oninput="saveCurrentData()">
            </div>
            <div class="transport-section no-print">
                <div class="transport-list d-inline-block"></div>
                <button class="btn btn-link btn-sm text-decoration-none text-muted p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="addTransport(this)">+ 增加交通</button>
                <button class="btn btn-link btn-sm text-decoration-none text-primary p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="openRouteJump(this, 'google')">Google Map</button>
                <button class="btn btn-link btn-sm text-decoration-none text-success p-0 m-0 ms-2" style="font-size:0.85rem;" onclick="openRouteJump(this, 'amap')">高德地圖</button>
            </div>`;
        container.appendChild(div);
        saveCurrentData(); 
    }

    function moveItem(btn, direction) {
        const wrapper = btn.closest('.activity-wrapper');
        if (direction === -1) {
            const prev = wrapper.previousElementSibling;
            if (prev) wrapper.parentNode.insertBefore(wrapper, prev);
        } else {
            const next = wrapper.nextElementSibling;
            if (next) wrapper.parentNode.insertBefore(wrapper, next.nextElementSibling);
        }
        saveCurrentData();
    }

    function addTransport(btn) { 
        const list = btn.closest('.transport-section').querySelector('.transport-list');
        const div = document.createElement('div');
        div.className = 'transport-pill shadow-sm';
        div.innerHTML = `
            <select class="border-0 bg-transparent fw-bold trans-select" style="outline:none;" onchange="saveCurrentData()">
                <option>🚶</option><option>🚇</option><option>🚌</option><option>🚕</option>
            </select>
            <input type="time" class="trans-time-picker" value="00:30" onchange="saveCurrentData()">
            <button class="btn btn-sm p-0 text-muted ms-1" onclick="this.parentElement.remove(); saveCurrentData();">✕</button>
        `;
        list.appendChild(div);
        saveCurrentData(); 
    }

    function saveCurrentData() {
        if (!currentPlanId || isLoading) return;
        if (window.saveDebounce) clearTimeout(window.saveDebounce);
        
        window.saveDebounce = setTimeout(() => {
            const daysData = [];
            document.querySelectorAll('.tab-content .tab-pane').forEach(pane => {
                const activities = [];
                pane.querySelectorAll('.activity-wrapper').forEach(wrapper => {
                    const transports = [];
                    wrapper.querySelectorAll('.transport-pill').forEach(pill => {
                        const select = pill.querySelector('select');
                        const timeInput = pill.querySelector('.trans-time-picker');
                        if(select && timeInput) {
                            transports.push({ type: select.value, duration: timeInput.value });
                        }
                    });
                    
                    const timeEl = wrapper.querySelector('.act-time');
                    const spotEl = wrapper.querySelector('.spot-input');
                    const detailEl = wrapper.querySelector('.field-detail');

                    activities.push({ 
                        time: timeEl ? timeEl.value : '', 
                        spot: spotEl ? spotEl.value : '', 
                        detail: detailEl ? detailEl.value : '', 
                        transports: transports 
                    });
                });
                
                daysData.push({ 
                    note: pane.querySelector('.day-note-area')?.value || '', 
                    activities 
                });
            });
            
            if (daysData.length > 0) {
                plans[currentPlanId].daysData = daysData; 
                plans[currentPlanId].days = daysData.length;
                saveToStorage();
            }
        }, 200); 
    }

    // 📥 改造後功能：導出為純文字
    function exportTextData() {
        if(Object.keys(plans).length === 0) { alert("目前沒有任何行程資料可以備份。"); return; }
        
        document.getElementById('modalTitle').innerText = "📥 複製純文字備份密碼";
        document.getElementById('modalDesc').innerText = "請複製下方框內的所有文字，儲存到你的記事本或發送到聊天群組中，這代表你所有的行程紀錄：";
        
        // 將 JSON 轉為簡潔易讀的純字串
        const base64Str = btoa(unescape(encodeURIComponent(JSON.stringify(plans))));
        const outputArea = document.getElementById('textDataArea');
        outputArea.value = base64Str;
        outputArea.readOnly = true;

        const actionBtn = document.getElementById('modalActionBtn');
        actionBtn.innerText = "一鍵複製文字";
        actionBtn.className = "btn btn-primary fw-bold";
        actionBtn.onclick = function() {
            outputArea.select();
            document.execCommand('copy');
            actionBtn.innerText = "✓ 複製成功！";
            actionBtn.className = "btn btn-success fw-bold";
        };

        textModal.show();
    }

    // 📤 改造後功能：導入純文字並還原
    function importTextData() {
        document.getElementById('modalTitle').innerText = "📤 還原純文字行程表";
        document.getElementById('modalDesc').innerText = "請在下方空白框內貼上你先前複製的備份文字代碼，然後點擊下方還原按鈕：";
        
        const outputArea = document.getElementById('textDataArea');
        outputArea.value = "";
        outputArea.readOnly = false;
        outputArea.placeholder = "請在此處按 Ctrl+V 貼上代碼...";

        const actionBtn = document.getElementById('modalActionBtn');
        actionBtn.innerText = "開始還原數據";
        actionBtn.className = "btn btn-danger fw-bold";
        actionBtn.onclick = function() {
            const val = outputArea.value.trim();
            if(!val) { alert("請輸入有效的備份文字！"); return; }
            try {
                const decodedJson = decodeURIComponent(escape(atob(val)));
                const importedPlans = JSON.parse(decodedJson);
                if(importedPlans && typeof importedPlans === 'object') {
                    plans = importedPlans;
                    saveToStorage();
                    loadPlanList();
                    if(Object.keys(plans).length > 0) {
                        loadPlan(Object.keys(plans)[0]);
                    }
                    textModal.hide();
                    alert("🎉 行程還原成功！已刷新列表。");
                } else {
                    alert("代碼格式不符合，還原失敗。");
                }
            } catch(err) {
                alert("還原出錯！請確認貼上的文字是完整、沒有漏複製的備份代碼。");
            }
        };

        textModal.show();
    }

    function removeWrapper(btn) { 
        if(confirm("刪除此行程點？")) { 
            btn.closest('.activity-wrapper').remove(); 
            saveCurrentData(); 
        } 
    }

    function searchGoogleVal(val) { 
        if (val) window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank'); 
    }

    function searchGoogleSpot(btn) { 
        searchGoogleVal(btn.closest('.input-group').querySelector('.spot-input').value); 
    }

    function copyToDay(btn) {
        const target = prompt("複製到第幾天？", "1");
        if (!target) return;
        const targetIdx = parseInt(target) - 1;
        if (plans[currentPlanId] && plans[currentPlanId].daysData[targetIdx]) {
            const w = btn.closest('.activity-wrapper');
            plans[currentPlanId].daysData[targetIdx].activities.push({
                time: w.querySelector('.act-time')?.value || '', 
                spot: w.querySelector('.spot-input')?.value || '', 
                detail: w.querySelector('.field-detail')?.value || '',
                transports: []
            });
            saveToStorage();
            renderPlanner(plans[currentPlanId].daysData);
        } else {
            alert("找不到該天數！");
        }
    }

    function openRouteJump(btn, type) {
        const w = btn.closest('.activity-wrapper'), all = Array.from(w.parentElement.querySelectorAll('.activity-wrapper')), idx = all.indexOf(w);
        const f = w.querySelector('.spot-input').value, t = (idx < all.length-1) ? all[idx+1].querySelector('.spot-input').value : "";
        const cf = prompt("從哪出發？", f || "我的位置"), ct = prompt("目的地：", t || "下個點");
        if(ct) window.open(type==='google' ? `https://www.google.com/maps/dir/${encodeURIComponent(cf)}/${encodeURIComponent(ct)}` : `https://www.amap.com/dir?from[name]=${encodeURIComponent(cf)}&to[name]=${encodeURIComponent(ct)}`, '_blank');
    }

    function exportPDF() {
        if (!currentPlanId || !plans[currentPlanId]) { alert("沒有可導出的行程數據！"); return; }
        
        const plan = plans[currentPlanId];
        const printContainer = document.getElementById('print-output-container');
        const dStart = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : null;
        
        let htmlContent = `
            <div style="padding: 20px; font-family: 'Noto Sans TC', sans-serif; color: #2b2d42; background: #fff;">
                <h2 style="text-align: center; margin-bottom: 5px; font-weight: 700;">${plan.location || '精美旅遊行程表'}</h2>
                <p style="text-align: center; color: #718096; font-size: 14px; margin-bottom: 25px;">
                    出發日期：${plan.date || '未設定'}  |  總天數：${plan.days || 1} 天
                </p>
        `;

        plan.daysData.forEach((day, i) => {
            let dayDateStr = '';
            if (dStart) {
                const curDate = new Date(dStart);
                curDate.setDate(dStart.getDate() + i);
                dayDateStr = `（${curDate.toLocaleDateString('zh-TW', {month:'long', day:'numeric', weekday:'long'})}）`;
            }

            htmlContent += `
                <div style="margin-bottom: 30px; page-break-inside: avoid;">
                    <h4 style="background: #f7fafc; padding: 8px 12px; border-left: 5px solid #ff6b6b; margin-bottom: 12px; font-weight: bold;">
                        第 ${i + 1} 天 ${dayDateStr}
                    </h4>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
                        <thead>
                            <tr style="border-bottom: 2px solid #cbd5e0; background: #edf2f7;">
                                <th style="padding: 10px; width: 15%; text-align: left; font-size: 14px;">時間</th>
                                <th style="padding: 10px; width: 35%; text-align: left; font-size: 14px;">行程項目/景點</th>
                                <th style="padding: 10px; width: 50%; text-align: left; font-size: 14px;">門票/預約/備註事項</th>
                            </tr>
                        </thead>
                        <tbody>`;

            if(day.activities && day.activities.length > 0) {
                day.activities.forEach(act => {
                    let transText = '';
                    if(act.transports && act.transports.length > 0) {
                        transText = ` <span style="color:#718096; font-size:12px;">(${act.transports.map(t=>t.type + t.duration).join(' → ')})</span>`;
                    }
                    htmlContent += `
                        <tr style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 10px; font-weight: bold; color:#ff6b6b; font-size: 14px;">${act.time || '--:--'}</td>
                            <td style="padding: 10px; font-weight: 500; font-size: 14px;">${act.spot || '未指定景點'}${transText}</td>
                            <td style="padding: 10px; color: #4a5568; font-size: 13px;">${act.detail || ''}</td>
                        </tr>`;
                });
            } else {
                htmlContent += `<tr><td colspan="3" style="padding: 15px; text-align: center; color: #a0aec0; font-size: 13px;">本日暫無行程安排</td></tr>`;
            }

            htmlContent += `
                        </tbody>
                    </table>`;

            if (day.note) {
                htmlContent += `
                    <div style="background: #fffaf0; border: 1px dashed #feebc8; padding: 10px 15px; border-radius: 6px; font-size: 13px; color: #dd6b20; margin-top: 5px;">
                        <strong>💡 當日備忘筆記：</strong> ${day.note.replace(/\n/g, '<br>')}
                    </div>`;
            }

            htmlContent += `</div>`;
        });

        htmlContent += `</div>`;
        
        printContainer.innerHTML = htmlContent;
        printContainer.style.display = 'block';

        const opt = {
            margin:       [10, 10, 10, 10],
            filename:     `${plan.location || '行程表'}_純文字版.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(printContainer).save().then(() => {
            printContainer.style.display = 'none';
        });
    }
    </script>
</body>
</html>
